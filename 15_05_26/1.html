<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заполните анкету</title>
</head>
<body>
    <h1><center>Заполните анкету</center></h1>
    <form action="form.php" method="post">
        
        <fieldset>
            <legend>Личные данные</legend>
            
            <input type="text" name="last_name" placeholder="Фамилия" pattern="^[А-Яа-яЁё]+$" size="25" maxlength="25" required autofocus> <br>
            <input type="text" name="first_name" placeholder="Имя" pattern="^[А-Яа-яЁё]+$" size="20" maxlength="20" required> <br>
            <input type="text" name="middle_name" placeholder="Отчество" pattern="^[А-Яа-яЁё]+$" size="24" maxlength="24" required>

            <fieldset>
                <legend>Паспортные данные</legend>
                <input type="text" name="pass_series" placeholder="Серия" pattern="[A-Z]{2}" size="2" maxlength="2" required title="две заглавные латинские буквы">
                <input type="text" name="pass_number" placeholder="Номер паспорта" pattern="[0-9]{7}" size="7" maxlength="7" required title="только цифры">
            </fieldset>

            <fieldset>
                <legend>Дата рождения</legend>
                <input type="text" name="year" placeholder="2000" pattern="[0-9]{4}" size="4" maxlength="4" required><br>
                <select name="month" required>
                    <option>Январь</option><option>Февраль</option><option>Март</option><option>Апрель</option>
                    <option>Май</option><option>Июнь</option><option>Июль</option><option>Август</option>
                    <option>Сентябрь</option><option>Октябрь</option><option>Ноябрь</option><option>Декабрь</option>
                </select><br>
                <input type="number" name="day" min="1" max="31" step="1" value="1" required><br>
            </fieldset>
            <select name="nationality" required>
                <option value="RB">РБ</option>
                <option value="RF">РФ</option>
            </select><br>
            Адрес:<br>
            <textarea name="address" lang="ru"></textarea>
        </fieldset>

        <fieldset>
            <legend>Интересы</legend>
            
            <fieldset>
                <legend>Хобби</legend>
                <input type="checkbox" name="hobby[]" value="fishing"> Рыбалка <br>
                <input type="checkbox" name="hobby[]" value="astronomy"> Астрономия <br>
                <input type="checkbox" name="hobby[]" value="diving"> Дайвинг <br>
                <input type="checkbox" name="hobby[]" value="stamps"> Марки
            </fieldset>

            <fieldset>
                <legend>Домашние животные (возможность выбора нескольких вариантов):</legend>
                <select name="pets[]" multiple size="10">
                    <optgroup label="Попугаи">
                        <option>Волнистый</option><option>Ара</option><option>Неразлучник</option>
                    </optgroup>
                    <optgroup label="Рыба">
                        <option>Караси</option><option>Окуни</option><option>Осетр</option>
                    </optgroup>
                    <optgroup label="Птицы">
                        <option>Стая ворон</option><option>Аист</option><option>Археоптерикс</option>
                    </optgroup>
                </select>
            </fieldset>
        </fieldset>

        <fieldset>
            <legend>Данные для входа и восстановления пароля</legend>
            <input type="text" name="login" placeholder="Логин" pattern="[A-Za-z]{5,20}" size="20" maxlength="20" required> <br>
            <input type="password" name="password" placeholder="Пароль" pattern="[A-Za-z]{10,20}" size="20" maxlength="20" autocomplete="off" required>
        </fieldset>

        <fieldset>
            <legend>Координаты:</legend>
            <input type="email" name="email" placeholder="введите адрес почты" required> <br>
            <input type="url" name="web_site" placeholder="введите адрес сайта" required>
        </fieldset>

        <fieldset>
            <legend>Цифры</legend>
            <input type="number" name="num" min="-2.5" max="2.5" step="0.1" placeholder="число"> <br>
            <input type="range" name="rng" min="1" max="10">
        </fieldset>

        <fieldset>
            <legend>Кнопки управления</legend>
            <input type="submit" value="Отправить">
            <input type="reset" value="Сбросить"><br>
            <input type="image" src="images/email.jpg" alt="email" onclick="return false;" style="vertical-align: middle; width: 24px;">
        </fieldset>

    </form>
</body>
</html>
