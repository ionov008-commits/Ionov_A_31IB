<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body p em a{color:gray}
        body div ul li a{color:red}
        body div ul li span a{color:green}
        body div ul li em a{color:blue}
        body div p em{color:yellow}
        body div span em a{color:black}
        body ul li a{color: orange}
        body ul li span a{color: pink}
        body ul li em a{color: violet}
        body ul li p em a{color:aqua}
        body ul li div ul li a{color: indigo}
        body ul li div ul li em a{color: chocolate}
        body ul li div ul li span a{color: brown}
        body ul li div p a{color:royalblue}
    </style>
</head>
<body>
    <div>
        <ul>
            <li>
                <a>red a1</a>
            </li>
            <li>
                <span>
                    <a>green a2</a>
                </span>
            </li>
            <li>
                <em>
                    <a>blue a3</a>
                </em>
            </li>
        </ul>
        <p>
            <em>yellow a4</em>
        </p>
        <span>
            <em>
                <a>black a5</a>
            </em>
        </span>
    </div>
    <ul>
        <li>
            <a>orange a6</a>
            <span>
                <a>pink a7</a>
            </span>
            <em>
                <a>violet a8</a>
            </em>
        </li>
        <li>
            <p>
                <em>
                    <a>aqua a9</a>
                </em>
            </p>
        </li>
        <li>
            <div>
                
                <ul>
                    <li>
                        <a>indigo a10</a>
                    </li>
                    <li><em><a>chocolate a11</a></em></li>
                    <li><span><a>brown a12</a></span></li>
                </ul>
                <p>
                    <a>royalblue a13</a>
                </p>
            </div>
        </li>
    </ul>
    <p>
        <em>
            <a>gray a14</a>
        </em>
    </p>
</body>
</html>
